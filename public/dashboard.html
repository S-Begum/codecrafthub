<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeCraftHub: Your Learning Management Platform</title>
    <style>
        /* Keep all your existing CSS styles - they're perfect! */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            text-align: center;
        }

        h1 {
            color: #8B5CF6;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #6b7280;
            font-size: 1.1em;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        h2 {
            color: #374151;
            margin-bottom: 20px;
            font-size: 1.8em;
            border-bottom: 3px solid #8B5CF6;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 600;
        }

        input[type="text"],
        input[type="date"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #8B5CF6;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-block;
        }

        .btn-primary {
            background: #8B5CF6;
            color: white;
        }

        .btn-primary:hover {
            background: #7c3aed;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
        }

        .btn-success {
            background: #F59E0B;
            color: white;
            padding: 8px 16px;
            font-size: 0.9em;
        }

        .btn-success:hover {
            background: #d97706;
        }

        .btn-danger {
            background: #EF4444;
            color: white;
            padding: 8px 16px;
            font-size: 0.9em;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .course-card {
            background: #f9fafb;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
        }

        .course-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            border-color: #8B5CF6;
        }

        .course-header {
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .course-name {
            color: #8B5CF6;
            font-size: 1.5em;
            font-weight: 700;
        }

        .course-description {
            color: #6b7280;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .course-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }

        .meta-item {
            background: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9em;
            color: #374151;
        }

        .meta-label {
            font-weight: 600;
            color: #8B5CF6;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .status-not-started {
            background: #fee2e2;
            color: #991b1b;
        }

        .status-in-progress {
            background: #fef3c7;
            color: #92400e;
        }

        .status-completed {
            background: #d1fae5;
            color: #065f46;
        }

        .course-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
            animation: slideIn 0.3s ease;
        }

        .message-success {
            background: #d1fae5;
            color: #065f46;
            border: 2px solid #10b981;
        }

        .message-error {
            background: #fee2e2;
            color: #991b1b;
            border: 2px solid #ef4444;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .spinner {
            border: 4px solid #f3f4f6;
            border-top: 4px solid #8B5CF6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .loading-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            color: #8B5CF6;
            font-size: 1.8em;
            font-weight: 700;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 2em;
            color: #6b7280;
            cursor: pointer;
            line-height: 1;
        }

        .close-btn:hover {
            color: #374151;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
        }

        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .courses-grid {
                grid-template-columns: 1fr;
            }

            .course-actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎓 CodeCraftHub</h1>
            <p class="subtitle">Your Learning Management Platform</p>
        </header>

        <div id="messageContainer"></div>

        <div class="card">
            <h2>➕ Add New Course</h2>
            <form id="addCourseForm">
                <div class="form-group">
                    <label for="courseName">Course Name *</label>
                    <input type="text" id="courseName" required placeholder="e.g., Advanced JavaScript">
                </div>
                <div class="form-group">
                    <label for="courseDescription">Description *</label>
                    <textarea id="courseDescription" required placeholder="Describe what this course covers..."></textarea>
                </div>
                <div class="form-group">
                    <label for="courseTargetDate">Target Completion Date *</label>
                    <input type="date" id="courseTargetDate" required>
                </div>
                <div class="form-group">
                    <label for="courseStatus">Status *</label>
                    <select id="courseStatus" required>
                        <option value="Not Started">Not Started</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Completed">Completed</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" id="submitBtn">Add Course</button>
            </form>
        </div>

        <div class="card">
            <h2>📚 My Courses</h2>
            <div id="coursesContainer">
                <div class="spinner"></div>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">✏️ Edit Course</h3>
                <button class="close-btn" onclick="closeEditModal()">&times;</button>
            </div>
            <form id="editCourseForm">
                <input type="hidden" id="editCourseId">
                <div class="form-group">
                    <label for="editCourseName">Course Name *</label>
                    <input type="text" id="editCourseName" required>
                </div>
                <div class="form-group">
                    <label for="editCourseDescription">Description *</label>
                    <textarea id="editCourseDescription" required></textarea>
                </div>
                <div class="form-group">
                    <label for="editCourseTargetDate">Target Completion Date *</label>
                    <input type="date" id="editCourseTargetDate" required>
                </div>
                <div class="form-group">
                    <label for="editCourseStatus">Status *</label>
                    <select id="editCourseStatus" required>
                        <option value="Not Started">Not Started</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Completed">Completed</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Update Course</button>
            </form>
        </div>
    </div>

    <script>
        // Use relative path for API
        const API_BASE_URL = '/api/courses';
        let courses = [];

        // Helper Functions
        function showMessage(message, type = 'success') {
            const messageContainer = document.getElementById('messageContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message message-${type}`;
            messageDiv.textContent = message;
            messageContainer.appendChild(messageDiv);

            setTimeout(() => {
                messageDiv.remove();
            }, 5000);
        }

        function showLoading(show = true) {
            if (show) {
                const overlay = document.createElement('div');
                overlay.id = 'loadingOverlay';
                overlay.className = 'loading-overlay';
                overlay.innerHTML = `
                    <div class="loading-content">
                        <div class="spinner"></div>
                        <p>Loading...</p>
                    </div>
                `;
                document.body.appendChild(overlay);
            } else {
                const overlay = document.getElementById('loadingOverlay');
                if (overlay) {
                    overlay.remove();
                }
            }
        }

        function formatDate(dateString) {
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            return new Date(dateString).toLocaleDateString(undefined, options);
        }

        function getStatusClass(status) {
            const statusMap = {
                'Not Started': 'status-not-started',
                'In Progress': 'status-in-progress',
                'Completed': 'status-completed'
            };
            return statusMap[status] || 'status-not-started';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Main Functions
        async function fetchCourses() {
            try {
                const response = await fetch(API_BASE_URL);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const responseData = await response.json();
                console.log('API Response:', responseData); // Debug log
                
                // Extract courses from the 'data' property (your API returns { success, count, data })
                courses = responseData.data || [];
                
                console.log('Courses extracted:', courses); // Debug log
                renderCourses();
            } catch (error) {
                console.error('Error fetching courses:', error);
                document.getElementById('coursesContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <h3>Unable to load courses</h3>
                        <p>Error: ${error.message}</p>
                        <p>Make sure the backend server is running at port 5000</p>
                    </div>
                `;
            }
        }

        function renderCourses() {
            const container = document.getElementById('coursesContainer');

            if (!courses || courses.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <h3>No courses yet</h3>
                        <p>Add your first course to get started!</p>
                    </div>
                `;
                return;
            }

            const coursesHTML = courses.map(course => `
                <div class="course-card">
                    <div class="course-header">
                        <div class="course-name">${escapeHtml(course.name)}</div>
                        <span class="status-badge ${getStatusClass(course.status)}">${course.status}</span>
                    </div>
                    <div class="course-description">${escapeHtml(course.description)}</div>
                    <div class="course-meta">
                        <div class="meta-item">
                            <span class="meta-label">Target Date:</span> ${formatDate(course.target_date)}
                        </div>
                        <div class="meta-item">
                            <span class="meta-label">Created:</span> ${formatDate(course.created_at)}
                        </div>
                    </div>
                    <div class="course-actions">
                        <button class="btn btn-success" onclick="openEditModal(${course.id})">Edit</button>
                        <button class="btn btn-danger" onclick="handleDelete(${course.id})">Remove</button>
                    </div>
                </div>
            `).join('');

            container.innerHTML = `<div class="courses-grid">${coursesHTML}</div>`;
        }

        // Add Course
        document.getElementById('addCourseForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const courseData = {
                name: document.getElementById('courseName').value,
                description: document.getElementById('courseDescription').value,
                target_date: document.getElementById('courseTargetDate').value,
                status: document.getElementById('courseStatus').value
            };

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Adding...';

            try {
                const response = await fetch(API_BASE_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(courseData)
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || `HTTP error! status: ${response.status}`);
                }

                const responseData = await response.json();
                console.log('Add course response:', responseData); // Debug log
                
                // Extract the new course from response data
                const newCourse = responseData.data || responseData;
                courses.push(newCourse);
                
                renderCourses();
                e.target.reset();
                showMessage('Course added successfully!', 'success');
            } catch (error) {
                console.error('Error adding course:', error);
                showMessage(`Failed to add course: ${error.message}`, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Add Course';
            }
        });

        // Edit Course
        function openEditModal(courseId) {
            const course = courses.find(c => c.id === courseId);
            if (!course) return;

            document.getElementById('editCourseId').value = course.id;
            document.getElementById('editCourseName').value = course.name;
            document.getElementById('editCourseDescription').value = course.description;
            document.getElementById('editCourseTargetDate').value = course.target_date;
            document.getElementById('editCourseStatus').value = course.status;

            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            document.getElementById('editCourseForm').reset();
        }

        document.getElementById('editCourseForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const courseId = document.getElementById('editCourseId').value;
            const courseData = {
                name: document.getElementById('editCourseName').value,
                description: document.getElementById('editCourseDescription').value,
                target_date: document.getElementById('editCourseTargetDate').value,
                status: document.getElementById('editCourseStatus').value
            };

            showLoading(true);

            try {
                const response = await fetch(`${API_BASE_URL}/${courseId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(courseData)
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || `HTTP error! status: ${response.status}`);
                }

                const responseData = await response.json();
                console.log('Update response:', responseData); // Debug log
                
                // Extract updated course from response
                const updatedCourse = responseData.data || responseData;
                
                const index = courses.findIndex(c => c.id === parseInt(courseId));
                if (index !== -1) {
                    courses[index] = updatedCourse;
                }
                
                renderCourses();
                closeEditModal();
                showMessage('Course updated successfully!', 'success');
            } catch (error) {
                console.error('Error updating course:', error);
                showMessage(`Failed to update course: ${error.message}`, 'error');
            } finally {
                showLoading(false);
            }
        });

        // Delete Course
        async function handleDelete(courseId) {
            if (!confirm('Are you sure you want to delete this course?')) {
                return;
            }

            showLoading(true);

            try {
                const response = await fetch(`${API_BASE_URL}/${courseId}`, {
                    method: 'DELETE'
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error || `HTTP error! status: ${response.status}`);
                }

                courses = courses.filter(c => c.id !== courseId);
                renderCourses();
                showMessage('Course deleted successfully!', 'success');
            } catch (error) {
                console.error('Error deleting course:', error);
                showMessage(`Failed to delete course: ${error.message}`, 'error');
            } finally {
                showLoading(false);
            }
        }

        // Close modal when clicking outside
        document.getElementById('editModal').addEventListener('click', (e) => {
            if (e.target.id === 'editModal') {
                closeEditModal();
            }
        });

        // Initialize by fetching courses
        document.addEventListener('DOMContentLoaded', () => {
            console.log('Dashboard initializing...');
            fetchCourses();
        });
    </script>
</body>
</html>
